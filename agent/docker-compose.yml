version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: stock_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-stock123}
      MYSQL_DATABASE: stock_analysis
      MYSQL_USER: ${MYSQL_USER:-stock}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-stock123}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"
    networks:
      - stock_network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  # 股票Agent服务
  stock_agent:
    build: .
    container_name: stock_agent
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-stock}:${MYSQL_PASSWORD:-stock123}@mysql:3306/stock_analysis
      STOCK_COOKIE: ${STOCK_COOKIE}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TZ: Asia/Shanghai
    volumes:
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - stock_network
    command: python main.py schedule

volumes:
  mysql_data:

networks:
  stock_network:
    driver: bridge
