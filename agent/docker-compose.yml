services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: stock_mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-stock123}
      MYSQL_DATABASE: stock_analysis
      MYSQL_USER: ${MYSQL_USER:-stock}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-stock123}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks:
      - stock_network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # 股票Agent服务
  stock_agent:
    build:
      context: .
      args:
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-https://mirrors.aliyun.com/debian}
        DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-https://mirrors.aliyun.com/debian-security}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.aliyun.com}
    container_name: stock_agent
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-stock}:${MYSQL_PASSWORD:-stock123}@mysql:3306/stock_analysis?charset=utf8mb4
      STOCK_COOKIE: ${STOCK_COOKIE:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      STOCK_FETCH_TIMEOUT: ${STOCK_FETCH_TIMEOUT:-30}
      STOCK_FETCH_MAX_RETRIES: ${STOCK_FETCH_MAX_RETRIES:-3}
      STOCK_FETCH_RETRY_DELAY: ${STOCK_FETCH_RETRY_DELAY:-1.0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - stock_network
    command: python main.py schedule
    stop_grace_period: 30s

  # Wiki/RAG服务（按需启动，CPU-only torch）
  rag_agent:
    profiles:
      - rag
    build:
      context: .
      dockerfile: Dockerfile.rag
      args:
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-https://mirrors.aliyun.com/debian}
        DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-https://mirrors.aliyun.com/debian-security}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.aliyun.com}
        PYTORCH_CPU_INDEX_URL: ${PYTORCH_CPU_INDEX_URL:-https://download.pytorch.org/whl/cpu}
        TORCH_VERSION: ${TORCH_VERSION:-2.7.1+cpu}
    container_name: rag_agent
    restart: "no"
    environment:
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./chain/wiki/raw:/app/chain/wiki/raw
      - ./chain/wiki/wiki:/app/chain/wiki/wiki
      - wiki_chroma:/app/chain/wiki/chroma_wiki_db
      - rag_chroma:/app/chain/rag/chroma_db
      - hf_cache:/root/.cache/huggingface
      - ./logs:/app/logs
    networks:
      - stock_network
    command: python -m main wiki pages

volumes:
  mysql_data:
  wiki_chroma:
  rag_chroma:
  hf_cache:

networks:
  stock_network:
    driver: bridge
