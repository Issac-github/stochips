services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: stock_mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-stock123}
      MYSQL_DATABASE: stock_analysis
      MYSQL_USER: ${MYSQL_USER:-stock}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-stock123}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./services/agent/docker/mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks:
      - stock_network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Bridges a host-loopback proxy (for example 127.0.0.1:7890) to Docker containers.
  codex_proxy_bridge:
    image: alpine/socat:latest
    container_name: codex_proxy_bridge
    restart: unless-stopped
    network_mode: host
    command:
      - -d
      - -d
      - TCP-LISTEN:${CODEX_PROXY_BRIDGE_PORT:-7891},fork,reuseaddr,bind=${CODEX_PROXY_BRIDGE_BIND:-0.0.0.0}
      - TCP:${CODEX_HOST_PROXY_HOST:-127.0.0.1}:${CODEX_HOST_PROXY_PORT:-7890}

  # 股票Agent服务
  stock_agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: stock_agent
      extra_hosts:
        - "host.docker.internal:host-gateway"
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${BUILD_NO_PROXY:-localhost,127.0.0.1,mysql,stock_agent,stock_rpc,rag_agent}
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-https://mirrors.aliyun.com/debian}
        DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-https://mirrors.aliyun.com/debian-security}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.aliyun.com}
    container_name: stock_agent
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-stock}:${MYSQL_PASSWORD:-stock123}@mysql:3306/stock_analysis?charset=utf8mb4
      CODEX_HTTP_PROXY: ${CODEX_HTTP_PROXY:-}
      CODEX_HTTPS_PROXY: ${CODEX_HTTPS_PROXY:-}
      CODEX_ALL_PROXY: ${CODEX_ALL_PROXY:-}
      CODEX_NO_PROXY: ${CODEX_NO_PROXY:-localhost,127.0.0.1,host.docker.internal,mysql,stock_agent,stock_rpc,rag_agent}
      STOCK_COOKIE: ${STOCK_COOKIE:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-codex}
      AI_FALLBACK_PROVIDER: ${AI_FALLBACK_PROVIDER:-none}
      CODEX_MODEL: ${CODEX_MODEL:-}
      CODEX_WORKING_DIRECTORY: ${CODEX_WORKING_DIRECTORY:-/app}
      STOCK_FETCH_TIMEOUT: ${STOCK_FETCH_TIMEOUT:-30}
      STOCK_FETCH_MAX_RETRIES: ${STOCK_FETCH_MAX_RETRIES:-3}
      STOCK_FETCH_RETRY_DELAY: ${STOCK_FETCH_RETRY_DELAY:-1.0}
      STOCK_FETCH_START_JITTER_MIN: ${STOCK_FETCH_START_JITTER_MIN:-5}
      STOCK_FETCH_START_JITTER_MAX: ${STOCK_FETCH_START_JITTER_MAX:-45}
      STOCK_FETCH_SOURCE_DELAY_MIN: ${STOCK_FETCH_SOURCE_DELAY_MIN:-3}
      STOCK_FETCH_SOURCE_DELAY_MAX: ${STOCK_FETCH_SOURCE_DELAY_MAX:-8}
      STOCK_FETCH_PAGE_DELAY_MIN: ${STOCK_FETCH_PAGE_DELAY_MIN:-0.8}
      STOCK_FETCH_PAGE_DELAY_MAX: ${STOCK_FETCH_PAGE_DELAY_MAX:-2.0}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
      FEISHU_WEBHOOK_SECRET: ${FEISHU_WEBHOOK_SECRET:-}
      FEISHU_ALERT_WEBHOOK_URL: ${FEISHU_ALERT_WEBHOOK_URL:-}
      FEISHU_ALERT_WEBHOOK_SECRET: ${FEISHU_ALERT_WEBHOOK_SECRET:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./services/agent/logs:/app/logs
      - codex_home:/root/.codex
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - stock_network
    command: sh -c "python migrations/runner.py && python main.py schedule"
    stop_grace_period: 30s
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import socket;socket.create_connection(('mysql',3306),timeout=2).close()" || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Go gRPC gateway for task submission; executes existing Python stock commands.
  stock_rpc:
    build:
      context: .
      dockerfile: Dockerfile
      target: stock_rpc
      extra_hosts:
        - "host.docker.internal:host-gateway"
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${BUILD_NO_PROXY:-localhost,127.0.0.1,mysql,stock_agent,stock_rpc,rag_agent}
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-https://mirrors.aliyun.com/debian}
        DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-https://mirrors.aliyun.com/debian-security}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.aliyun.com}
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
    container_name: stock_rpc
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-stock}:${MYSQL_PASSWORD:-stock123}@mysql:3306/stock_analysis?charset=utf8mb4
      CODEX_HTTP_PROXY: ${CODEX_HTTP_PROXY:-}
      CODEX_HTTPS_PROXY: ${CODEX_HTTPS_PROXY:-}
      CODEX_ALL_PROXY: ${CODEX_ALL_PROXY:-}
      CODEX_NO_PROXY: ${CODEX_NO_PROXY:-localhost,127.0.0.1,host.docker.internal,mysql,stock_agent,stock_rpc,rag_agent}
      STOCK_COOKIE: ${STOCK_COOKIE:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-codex}
      AI_FALLBACK_PROVIDER: ${AI_FALLBACK_PROVIDER:-none}
      CODEX_MODEL: ${CODEX_MODEL:-}
      CODEX_WORKING_DIRECTORY: ${CODEX_WORKING_DIRECTORY:-/app}
      STOCK_FETCH_TIMEOUT: ${STOCK_FETCH_TIMEOUT:-30}
      STOCK_FETCH_MAX_RETRIES: ${STOCK_FETCH_MAX_RETRIES:-3}
      STOCK_FETCH_RETRY_DELAY: ${STOCK_FETCH_RETRY_DELAY:-1.0}
      STOCK_FETCH_START_JITTER_MIN: ${STOCK_FETCH_START_JITTER_MIN:-5}
      STOCK_FETCH_START_JITTER_MAX: ${STOCK_FETCH_START_JITTER_MAX:-45}
      STOCK_FETCH_SOURCE_DELAY_MIN: ${STOCK_FETCH_SOURCE_DELAY_MIN:-3}
      STOCK_FETCH_SOURCE_DELAY_MAX: ${STOCK_FETCH_SOURCE_DELAY_MAX:-8}
      STOCK_FETCH_PAGE_DELAY_MIN: ${STOCK_FETCH_PAGE_DELAY_MIN:-0.8}
      STOCK_FETCH_PAGE_DELAY_MAX: ${STOCK_FETCH_PAGE_DELAY_MAX:-2.0}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
      FEISHU_WEBHOOK_SECRET: ${FEISHU_WEBHOOK_SECRET:-}
      FEISHU_ALERT_WEBHOOK_URL: ${FEISHU_ALERT_WEBHOOK_URL:-}
      FEISHU_ALERT_WEBHOOK_SECRET: ${FEISHU_ALERT_WEBHOOK_SECRET:-}
      STOCK_RPC_ADDR: :50051
      STOCK_RPC_AGENT_DIR: /app
      PYTHON_BIN: python
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./services/agent/logs:/app/logs
      - codex_home:/root/.codex
    ports:
      - "${STOCK_RPC_PORT:-50051}:50051"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - stock_network
    command: sh -c "python migrations/runner.py && exec stock-rpc"
    stop_grace_period: 30s
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import socket;socket.create_connection(('localhost',50051),timeout=2).close()" || exit 1
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Wiki/RAG服务（按需启动，CPU-only torch）
  rag_agent:
    profiles:
      - rag
    build:
      context: ./services/agent
      dockerfile: Dockerfile.rag
      extra_hosts:
        - "host.docker.internal:host-gateway"
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${BUILD_NO_PROXY:-localhost,127.0.0.1,mysql,stock_agent,stock_rpc,rag_agent}
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-https://mirrors.aliyun.com/debian}
        DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-https://mirrors.aliyun.com/debian-security}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.aliyun.com}
        PYTORCH_CPU_INDEX_URL: ${PYTORCH_CPU_INDEX_URL:-https://download.pytorch.org/whl/cpu}
        TORCH_VERSION: ${TORCH_VERSION:-2.7.1+cpu}
    container_name: rag_agent
    restart: "no"
    environment:
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./services/agent/chain/wiki/raw:/app/chain/wiki/raw
      - ./services/agent/chain/wiki/wiki:/app/chain/wiki/wiki
      - wiki_chroma:/app/chain/wiki/chroma_wiki_db
      - rag_chroma:/app/chain/rag/chroma_db
      - hf_cache:/root/.cache/huggingface
      - ./services/agent/logs:/app/logs
    networks:
      - stock_network
    command: python -m main wiki pages

volumes:
  mysql_data:
  wiki_chroma:
  rag_chroma:
  hf_cache:
  codex_home:

networks:
  stock_network:
    driver: bridge
